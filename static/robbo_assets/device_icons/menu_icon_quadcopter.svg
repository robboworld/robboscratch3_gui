<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-hidden="true">
  <defs>
    <g id="propeller" fill="#000">
      <!-- лопасти-лопатки: сужение у ступицы, расширение и скругление на концах -->
      <path d="M -0.42 -0.32 L -2.02 -0.76 C -4.81 -1.36 -6.66 -1.44 -6.7 -0.4 C -6.66 1.44 -4.81 1.36 -2.02 0.76 L -0.42 0.32 Z"/>
      <path d="M 0.42 0.32 L 2.02 0.76 C 4.81 1.36 6.66 1.44 6.7 0.4 C 6.66 -1.44 4.81 -1.36 2.02 -0.76 L 0.42 -0.32 Z"/>
    </g>
  </defs>
  <g fill="#000">
    <!-- лучи рамы -->
    <g stroke="#000" stroke-width="2.15" stroke-linecap="round" fill="none">
      <line x1="12" y1="12" x2="8.25" y2="8.25"/>
      <line x1="24" y1="12" x2="27.75" y2="8.25"/>
      <line x1="12" y1="24" x2="8.25" y2="27.75"/>
      <line x1="24" y1="24" x2="27.75" y2="27.75"/>
    </g>
    <!-- центральный корпус -->
    <rect x="12" y="12" width="12" height="12" rx="1.5"/>
    <rect x="13.6" y="13.15" width="8.8" height="9.7" rx="1.35"/>
    <!-- разъём слева: по центру, высота 70% ширины корпуса, небольшой выступ -->
    <rect x="10.55" y="13.8" width="1.45" height="8.4" rx="0.28"/>
    <!-- лопасти: поперёк луча -->
    <use href="#propeller" transform="translate(7.1 7.1) rotate(-45)"/>
    <use href="#propeller" transform="translate(28.9 7.1) rotate(45)"/>
    <use href="#propeller" transform="translate(7.1 28.9) rotate(45)"/>
    <use href="#propeller" transform="translate(28.9 28.9) rotate(-45)"/>
    <!-- ступицы моторов -->
    <circle cx="7.1" cy="7.1" r="1.05"/>
    <circle cx="28.9" cy="7.1" r="1.05"/>
    <circle cx="7.1" cy="28.9" r="1.05"/>
    <circle cx="28.9" cy="28.9" r="1.05"/>
  </g>
</svg>
