<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-hidden="true">
  <defs>
    <mask id="lab-cut" maskUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="#fff"/>
      <!-- ползунок (верх-центр) -->
      <rect x="7" y="8.2" width="12" height="2.6" rx="1.3" fill="#000"/>
      <!-- микрофон (верх-право) -->
      <circle cx="27.5" cy="9.8" r="2" fill="#000"/>
      <!-- micro-USB (левый край) -->
      <rect x="4" y="13.2" width="2.4" height="2.6" rx="0.4" fill="#000"/>
      <!-- левый гребень пинов (прижат к низу платы) -->
      <rect x="6.8" y="16" width="1.4" height="14" rx="0.4" fill="#000"/>
      <!-- динамик (слева от кнопок) -->
      <rect x="12" y="25.2" width="4" height="3.6" rx="0.5" fill="#000"/>
      <!-- светодиоды: 3 — отступ — 8 (отступ справа от края платы) -->
      <circle cx="15.8" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="17.2" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="18.6" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="21" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="22.3" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="23.6" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="24.9" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="26.2" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="27.5" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="28.8" cy="15.6" r="0.7" fill="#000"/>
      <circle cx="30.1" cy="15.6" r="0.7" fill="#000"/>
      <!-- кнопки: крест (центр 22,23.5, шаг 3.2); 5 справа от 3 -->
      <circle cx="22" cy="20.3" r="1.6" fill="#000"/>
      <circle cx="18.8" cy="23.5" r="1.6" fill="#000"/>
      <circle cx="22" cy="26.7" r="1.6" fill="#000"/>
      <circle cx="25.2" cy="23.5" r="1.6" fill="#000"/>
      <circle cx="29.2" cy="23.5" r="1.6" fill="#000"/>
    </mask>
  </defs>
  <g fill="#000" mask="url(#lab-cut)">
    <!-- плата лаборатории -->
    <rect x="4" y="6" width="28" height="24" rx="2"/>
  </g>
</svg>
