<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-hidden="true">
  <defs>
    <mask id="otto-cut" maskUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="#fff"/>
      <!-- глаза (ультразвуковые датчики) -->
      <circle cx="15" cy="9.6" r="2" fill="#000"/>
      <circle cx="21" cy="9.6" r="2" fill="#000"/>
    </mask>
  </defs>
  <g fill="#000" mask="url(#otto-cut)">
    <!-- голова -->
    <rect x="11" y="5" width="14" height="9" rx="2"/>
    <!-- корпус -->
    <rect x="10.5" y="14.5" width="15" height="8.5" rx="0.5"/>
    <!-- крепления ног у основания -->
    <rect x="10.5" y="23" width="4" height="1.6" rx="0.3"/>
    <rect x="21.5" y="23" width="4" height="1.6" rx="0.3"/>
    <!-- плечи выровнены с руками (ширина 3) + крепление к корпусу -->
    <rect x="5.8" y="15.6" width="3" height="4" rx="0.3"/>
    <rect x="9.3" y="15.6" width="1.2" height="4" rx="0.2"/>
    <rect x="25.5" y="15.6" width="1.2" height="4" rx="0.2"/>
    <rect x="27.2" y="15.6" width="3" height="4" rx="0.3"/>
    <!-- руки (чуть тоньше ног: 3 против 4) -->
    <rect x="5.8" y="19.6" width="3" height="5.3"/>
    <rect x="27.2" y="19.6" width="3" height="5.3"/>
    <!-- ножки от краёв корпуса -->
    <rect x="10.5" y="24.6" width="4" height="4.3"/>
    <rect x="21.5" y="24.6" width="4" height="4.3"/>
    <!-- ступни: до середины ручек (центр руки x=7.3 / 28.7) -->
    <rect x="7.3" y="28.9" width="7.2" height="1.4" rx="0.4"/>
    <rect x="21.5" y="28.9" width="7.2" height="1.4" rx="0.4"/>
  </g>
</svg>
