<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-hidden="true">
  <defs>
    <mask id="arduino-cut" maskUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="#fff"/>
      <!-- монтажные отверстия -->
      <circle cx="5.6" cy="9.4" r="0.85" fill="#000"/>
      <circle cx="30.4" cy="9.4" r="0.85" fill="#000"/>
      <circle cx="5.6" cy="26.6" r="0.85" fill="#000"/>
      <circle cx="28.8" cy="26.6" r="0.85" fill="#000"/>
      <!-- верхний ряд digital-пинов (14 штырей) -->
      <rect x="11.2" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="12.55" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="13.9" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="15.25" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="16.6" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="17.95" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="19.3" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="20.65" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="21.95" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="23.3" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="24.65" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="26" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="27.35" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <rect x="28.7" y="7.3" width="0.85" height="1.7" fill="#000"/>
      <!-- нижний левый блок power-пинов (6 штырей) -->
      <rect x="11.2" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="12.55" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="13.9" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="15.25" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="16.6" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="17.95" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <!-- нижний правый блок analog-пинов (6 штырей) -->
      <rect x="22.5" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="23.85" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="25.2" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="26.55" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="27.9" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <rect x="29.25" y="26.1" width="0.85" height="1.7" fill="#000"/>
      <!-- логотип Arduino (∞) -->
      <path d="M18,13.1C16,11.3 14.2,11.3 14.2,13.1C14.2,14.9 16,14.9 18,13.1C20,11.3 21.8,11.3 21.8,13.1C21.8,14.9 20,14.9 18,13.1Z" fill="#000"/>
      <!-- овал UNO -->
      <ellipse cx="24.8" cy="13.2" rx="2.6" ry="1.2" fill="#000"/>
      <!-- кварц 16 МГц -->
      <ellipse cx="11.4" cy="20.2" rx="1.5" ry="0.85" fill="#000"/>
      <!-- кнопка RESET -->
      <rect x="17" y="15.2" width="2.1" height="2.1" rx="0.35" fill="#000"/>
      <!-- DIP-чип ATmega328P (нижняя половина платы) -->
      <rect x="14.8" y="19.65" width="14" height="2.9" rx="0.35" fill="#000"/>
      <!-- ICSP-разъём (правый край) -->
      <rect x="30.9" y="14.2" width="1" height="3.6" rx="0.2" fill="#000"/>
      <!-- светодиоды L / TX / RX -->
      <circle cx="9.8" cy="11.2" r="0.45" fill="#000"/>
      <circle cx="9.8" cy="12.5" r="0.45" fill="#000"/>
      <circle cx="11.2" cy="11.8" r="0.45" fill="#000"/>
      <!-- светодиод ON -->
      <circle cx="29.2" cy="11.2" r="0.45" fill="#000"/>
      <!-- конденсаторы у разъёма питания -->
      <rect x="8.8" y="22.8" width="1.1" height="2" rx="0.55" fill="#000"/>
      <rect x="10.2" y="22.8" width="1.1" height="2" rx="0.55" fill="#000"/>
    </mask>
  </defs>
  <g fill="#000" mask="url(#arduino-cut)">
    <!-- плата Arduino Uno -->
    <rect x="4" y="8" width="28" height="20" rx="1.8"/>
  </g>
  <g fill="#000">
    <!-- USB-B (левый верх, выступает за край) -->
    <rect x="2.2" y="9.6" width="4.8" height="5.6" rx="0.55"/>
    <!-- разъём питания DC (левый низ) -->
    <rect x="3" y="21.4" width="5" height="5" rx="2.5"/>
  </g>
</svg>
